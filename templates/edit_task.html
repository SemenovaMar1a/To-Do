<!DOCTYPE html>
<html>
<head>
    <title>Редактировать задачу</title>
</head>
<body>
    <h2>Редактировать задачу</h2>
    <form method="post" action="/task/editing/{{ task.id }}">
        <label for="title">Название:</label>
        <input type="text" name="title" value="{{ task.title }}" required><br><br>

        <label for="description">Описание:</label>
        <textarea name="description" required>{{ task.description }}</textarea><br><br>

        <label for="description">Завершено:</label>
        <input type="checkbox" name="is_completed" value="true" {% if task.is_completed %}checked{% endif %}>

        <button type="submit">Сохранить изменения</button>
    </form>
</body>
</html>
